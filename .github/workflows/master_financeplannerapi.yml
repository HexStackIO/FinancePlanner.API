# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - financeplannerapi
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Build with dotnet
        run: dotnet build --configuration Release
      - name: dotnet publish
        run: dotnet publish src/FinancePlanner.API/FinancePlanner.API.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp
  migrate:
    runs-on: windows-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore NuGet packages
        run: dotnet restore
      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef
      - name: Run migrations
        run: |
          dotnet ef database update `
            --project src\FinancePlanner.Infrastructure\FinancePlanner.Infrastructure.csproj `
            --startup-project src\FinancePlanner.API\FinancePlanner.API.csproj `
            --connection "${{ secrets.AZURE_POSTGRESQL_CONNECTION_STRING }}"
        shell: pwsh
  deploy:
    runs-on: windows-latest
    needs: migrate
    permissions:
      id-token: write 
      contents: read 
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E24F4D923A00472A9058E3F8EAD9BB5C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_38251B6DE17E42EAA686F038B821FAF8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_77162098FF674B71BB66833B6AC5D6AF